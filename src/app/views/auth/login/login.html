<div class="login-page">
  <div class="login-left">
    <div class="brand">
      <div class="brand-icon">KE</div>
      <span class="brand-name">KikEvent</span>
    </div>
    <h1 class="login-title">Accès<br>Back-Office</h1>
    <p class="login-sub">Plateforme de gouvernance et administration des événements.</p>
    <div class="feat-list">
      <div class="feat-item" *ngFor="let f of features">
        <span class="feat-dot"></span>{{ f }}
      </div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-card">
      <h2>Connexion Admin</h2>
      <p class="login-hint">Espace réservé aux administrateurs KikEvent</p>
      <div *ngIf="errorMsg" class="err-banner">{{ errorMsg }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="admin@kikevent.cm" [class.invalid]="f['email'].touched && f['email'].invalid">
          <span class="ferr" *ngIf="f['email'].touched && f['email'].errors?.['required']">Email requis</span>
          <span class="ferr" *ngIf="f['email'].touched && f['email'].errors?.['email']">Format invalide</span>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <div class="pw-wrap">
            <input [type]="showPass ? 'text' : 'password'" formControlName="password" placeholder="••••••••" [class.invalid]="f['password'].touched && f['password'].invalid">
            <button type="button" class="pw-toggle" (click)="showPass=!showPass">{{ showPass ? '🙈' : '👁' }}</button>
          </div>
          <span class="ferr" *ngIf="f['password'].touched && f['password'].errors?.['required']">Mot de passe requis</span>
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading" class="spin"></span>
        </button>
        <button type="button" class="submit-btn btn-google" [disabled]="loading" (click)="loginWithGoogle()">
          Continuer avec Google
        </button>
      </form>
      <p class="sec-note">
        Connexion sécurisée HTTPS · KikEvent Admin v1.0<br>
        <a routerLink="/register" style="color:#5B4CF5">Créer un compte</a>
      </p>
    </div>
  </div>
</div>

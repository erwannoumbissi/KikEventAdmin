<div class="login-page">
  <div class="login-right" style="width:100%">
    <div class="login-card">
      <h2>Créer un compte</h2>
      <p class="login-hint">Inscription locale via l'API KikEvent</p>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <input type="text" formControlName="username" placeholder="admin_kikevent">
          <span class="ferr" *ngIf="f['username'].touched && f['username'].invalid">Minimum 3 caractères</span>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="admin@kikevent.cm">
          <span class="ferr" *ngIf="f['email'].touched && f['email'].invalid">Email invalide</span>
        </div>

        <div class="form-group">
          <label>Téléphone</label>
          <input type="number" formControlName="phoneNumber" placeholder="699000000">
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" formControlName="password" placeholder="Minimum 8 caractères">
          <span class="ferr" *ngIf="f['password'].touched && f['password'].invalid">Minimum 8 caractères</span>
        </div>

        <button class="submit-btn" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Créer le compte</span>
          <span *ngIf="loading" class="spin"></span>
        </button>
      </form>

      <p class="sec-note">
        Déjà un compte ? <a routerLink="/login" style="color:#5B4CF5">Se connecter</a>
      </p>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="page-header">
    <div><h1>Paramètres</h1><p>Configuration générale du back-office KikEvent</p></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <!-- Profil -->
    <div class="card">
      <div class="card-header"><h3>Profil administrateur</h3></div>
      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" [(ngModel)]="profile.nom">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="profile.email">
      </div>
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" [(ngModel)]="profile.password" placeholder="Laisser vide pour ne pas changer">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="profile.confirmPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" (click)="saveProfile()">Enregistrer le profil</button>
    </div>

    <!-- Système -->
    <div class="card">
      <div class="card-header"><h3>Configuration système</h3></div>
      <div class="form-group">
        <label>URL API backend</label>
        <input type="url" [(ngModel)]="system.apiUrl">
      </div>
      <div class="form-group">
        <label>Nom de la plateforme</label>
        <input type="text" [(ngModel)]="system.platformName">
      </div>
      <div class="form-group">
        <label>Email support</label>
        <input type="email" [(ngModel)]="system.supportEmail">
      </div>
      <div class="form-group">
        <label>Devise</label>
        <select [(ngModel)]="system.devise">
          <option>FCFA (XAF)</option>
          <option>EUR</option>
          <option>USD</option>
        </select>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:12px">
        <label style="margin:0">Mode Mock (développement)</label>
        <input type="checkbox" [(ngModel)]="system.mockMode">
        <span class="badge" [ngClass]="system.mockMode ? 'badge-warning' : 'badge-success'">
          {{ system.mockMode ? 'Mock actif' : 'API réelle' }}
        </span>
      </div>
      <button class="btn btn-primary" (click)="saveSystem()">Sauvegarder</button>
    </div>
  </div>

  <!-- Info environnement -->
  <div class="card" style="margin-top:4px">
    <div class="card-header"><h3>Informations système</h3></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;font-size:13px">
      <div><span style="color:#9CA3AF">Version</span><br><strong>1.0.0</strong></div>
      <div><span style="color:#9CA3AF">Environnement</span><br><strong>Développement</strong></div>
      <div><span style="color:#9CA3AF">Mode</span><br><span class="badge badge-warning">Mock Interceptor actif</span></div>
    </div>
  </div>
</div>

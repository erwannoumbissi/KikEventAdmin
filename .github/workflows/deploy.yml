name: Deploy KikEventAdmin to VPS

on:
  push:
    branches: [ main ] # Se déclenche dès que tu push sur la branche main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Version standard pour Angular récent

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build -- --configuration production

    - name: Deploy to VPS via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        # ATTENTION : Vérifie bien le nom exact du dossier dans 'dist/' 
        # (Souvent c'est le "name" dans ton package.json)
        source: "dist/kik-event-admin/browser/*"
        target: "/var/www/kikevent-admin"
        strip_components: 3 # Retire 'dist/kik-event-admin/browser' du chemin de destination
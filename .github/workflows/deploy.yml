name: Deploy KikEventAdmin to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build -- --configuration production

    # ÉTAPE DE DEBUG : Pour voir où sont tes fichiers
    - name: Check build output
      run: find dist -maxdepth 4

    - name: Deploy to VPS via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        # On prend tout ce qui est dans dist pour être sûr
        source: "dist/**/*"
        target: "/var/www/kikevent-admin"
        # On commence par 2 (pour ignorer 'dist' et le 'nom-du-projet')
        strip_components: 2
name: Deploy KikEventAdmin to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build -- --configuration production

    - name: Deploy to VPS via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        # Cette syntaxe cherche récursivement les fichiers dans le dossier dist
        source: "dist/**/browser/**/*"
        target: "/var/www/kikevent-admin"
        # On utilise 3 ou 4 selon ta structure. Testons avec 3 pour commencer 
        # si ton dossier est dist/KikEventAdmin/browser
        strip_components: 3